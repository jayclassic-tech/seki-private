<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family: 'Helvetica Neue', Helvetica, sans-serif; font-size: 14px; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  <div style="background: #f9f9f9; border-radius: 6px; padding: 24px 28px;">
    <p style="margin: 0 0 16px;">Hey {{first_name}},</p>
    <p style="margin: 0 0 14px; line-height: 1.6;">{{body_line1}}</p>
    <p style="margin: 0 0 20px; line-height: 1.6;">{{body_line2}}</p>
    <p style="margin: 0 0 20px;">{{closing}}</p>
    <p style="margin: 0; font-size: 13px; color: #555;">
      — {{sender_name}}<br>
      <span style="color: #888;">{{sender_title}}</span>
    </p>
  </div>
</body>
</html>
